<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Code Visualizer</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon48.png" alt="Logo" class="logo" />
      <h1>GitHub Code Visualizer</h1>
    </div>

    <div id="status-bar" class="status-bar status-none">
      <span id="status-text">No token — rate limited to 60 req/hr</span>
    </div>

    <div class="section">
      <label for="token-input">GitHub Personal Access Token</label>
      <input
        id="token-input"
        type="password"
        placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="button-row">
        <button id="save-btn" class="btn btn-primary">Save Token</button>
        <button id="clear-btn" class="btn btn-secondary">Clear</button>
      </div>
    </div>

    <div id="validation-msg" class="validation-msg" hidden></div>

    <div class="help-text">
      Need a token?
      <a
        href="https://github.com/settings/tokens/new?scopes=repo&description=GitHub+Code+Visualizer"
        target="_blank"
        rel="noopener noreferrer"
      >Generate one on GitHub</a>
      <br />
      Scopes needed: <code>public_repo</code> (or <code>repo</code> for private repos)
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
